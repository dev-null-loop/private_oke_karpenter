#cloud-config

write_files:
  - path: /usr/local/sbin/apply-copyfail-ksplice.sh
    permissions: "0755"
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail

      CVE="CVE-2026-31431"
      KERNEL="$(uname -r)"
      EXPECTED=""

      case "$KERNEL" in
        6.12.0-*uek*|6.12.0-*.el*uek*)
          FAMILY="UEK8"
          EXPECTED="6.12.0-201.74.2.2"
          ;;
        5.15.0-*uek*|5.15.0-*.el*uek*)
          FAMILY="UEK7"
          EXPECTED="5.15.0-319.201.4.4"
          ;;
        5.4.17-*uek*|5.4.17-*.el*uek*)
          FAMILY="UEK6"
          EXPECTED="5.4.17-2136.354.4.2"
          ;;
        *)
          echo "Unsupported or unknown kernel for copy.fail Ksplice mapping: $KERNEL"
          exit 42
          ;;
      esac

      echo "Detected kernel: $KERNEL"
      echo "Detected family: $FAMILY"
      echo "Expected Ksplice effective kernel: $EXPECTED"

      if ! command -v /usr/sbin/uptrack-upgrade >/dev/null 2>&1; then
        echo "Ksplice tools not found; attempting install"
        dnf install -y ksplice ksplice-tools || yum install -y ksplice ksplice-tools
      fi

      echo "Ksplice state before:"
      /usr/sbin/uptrack-show || true

      echo "Applying available Ksplice updates"
      /usr/sbin/uptrack-upgrade -y --all

      echo "Ksplice state after:"
      AFTER="$(/usr/sbin/uptrack-show || true)"
      echo "$AFTER"

      if echo "$AFTER" | grep -q "$CVE"; then
        echo "$CVE Ksplice patch is installed"
        exit 0
      fi

      if echo "$AFTER" | grep -q "$EXPECTED"; then
        echo "Effective kernel matches expected patched level: $EXPECTED"
        exit 0
      fi

      echo "ERROR: copy.fail Ksplice patch validation failed"
      echo "Expected to see $CVE or effective kernel $EXPECTED"
      exit 43

runcmd:
  - |
    /usr/local/sbin/apply-copyfail-ksplice.sh
  - |
    curl --fail -H "Authorization: Bearer Oracle" -L0 \
      http://169.254.169.254/opc/v2/instance/metadata/oke_init_script \
      | base64 --decode >/var/run/oke-init.sh
    bash /var/run/oke-init.sh
